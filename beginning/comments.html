<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>AituLIB - Comments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/styles(tamer).css">
</head>
<body class="text-light" style="background-color:#0f1720;">
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary" style="background-color:#0b1220;">
    <div class="container position-relative">
        <a class="navbar-brand d-flex align-items-center gap-2" href="main.html" aria-label="AituLIB home">
            <img src="../assets/logo.png" alt="AituLIB logo"
                 class="img-fluid rounded"
                 style="height:clamp(28px, 5vw, 40px); width:auto;">
        </a>
        <span class="navbar-text text-secondary h5 m-0 position-absolute start-50 translate-middle-x text-center">
        Comments
      </span>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="main.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="chapters.html">Chapters</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="comments.html">Comments</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container-fluid py-5 ps-3 ps-md-4 pe-3">
    <div class="row g-4">
        <aside class="col-12 col-md-3">
            <div class="p-3 rounded border border-secondary">
                <nav aria-label="Sidebar navigation">
                    <ul class="list-unstyled mb-0">
                        <li class="mb-2"><a class="link-light text-decoration-none" href="chapters.html">Chapters</a></li>
                        <li class="mb-2"><a class="link-light text-decoration-none" href="comments.html">Comments</a></li>
                        <li class="mb-0"><a class="link-light text-decoration-none" href="main.html">Home</a></li>
                    </ul>
                </nav>
            </div>
        </aside>
        <section class="col-12 col-md-9">
            <form action="#" class="mb-4">
                <label for="comment2" class="form-label">Your comment</label>
                <textarea name="comment" id="comment2" placeholder="Leave your comment here..."
                          class="form-control mb-3" rows="5"></textarea>
                <button type="submit" id="but" class="btn btn-primary">Submit</button>
            </form>

            <div class="comments vstack gap-3">
                <div class="comment d-flex gap-3 p-3 rounded border border-secondary" style="background-color:#0b1220;">
                    <div class="comment__avatar rounded-circle overflow-hidden flex-shrink-0" style="width:40px;height:40px;">
                        <img src="../assets/user.png" alt="user" class="d-block w-100 h-100 object-fit-cover border border-secondary">
                    </div>
                    <div class="comment__content flex-grow-1">
                        <span class="comment__author fw-bold text-light d-block mb-1">Иван</span>
                        <p class="comment__text text-light-emphasis mb-2">Так себе, Ван пис лучше.</p>
                        <span class="comment__date text-secondary small d-block text-end">19.09.2025</span>
                    </div>
                </div>

                <div class="comment d-flex gap-3 p-3 rounded border border-secondary " style="background-color:#0b1220;">
                    <div class="comment__avatar rounded-circle overflow-hidden flex-shrink-0" style="width:40px;height:40px;">
                        <img src="../assets/user.png" alt="user" class="d-block w-100 h-100 object-fit-cover border border-secondary">
                    </div>
                    <div class="comment__content flex-grow-1">
                        <span class="comment__author fw-bold text-light d-block mb-1">Мария</span>
                        <p class="comment__text text-light-emphasis mb-2">Рисовка ниче.</p>
                        <span class="comment__date text-secondary small d-block text-end">19.09.2025</span>
                    </div>
                </div>

                <div class="comment d-flex gap-3 p-3 rounded border border-secondary " style="background-color:#0b1220;">
                    <div class="comment__avatar rounded-circle overflow-hidden flex-shrink-0" style="width:40px;height:40px;">
                        <img src="../assets/user.png" alt="user" class="d-block w-100 h-100 object-fit-cover border border-secondary">
                    </div>
                    <div class="comment__content flex-grow-1">
                        <span class="comment__author fw-bold text-light d-block mb-1">Алексей</span>
                        <p class="comment__text text-light-emphasis mb-2">Snapix lox</p>
                        <span class="comment__date text-secondary small d-block text-end">19.09.2025</span>
                    </div>
                </div>
            </div>

        </section>
    </div>
</main>

<footer class="bg-black border-top border-secondary py-4">
    <div class="container text-center">
        <p class="mb-0 small text-secondary">© 2025 AituLIB. All rights reserved.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
